<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>sign up</title>
</head>
<body>
<div class="container" >
    <div class="flexFirstItem">
        <div class="odinLogo">
            <img src="icons/odin-lined.png" alt = 
            "odin logo">
            <div class="odinText">Odin</div>
        </div>
    </div>

    <div class="formContainer">
        <div class="serviceAwareness">
            <p class="serviceAwarenessText">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br>
            </p>
            <p class="serviceAwarenessText">You <em>know</em> you want to.</p>
        </div>
    
    
        <form action="#" method="post">
            <div class="formItem">
                <label for = "firstName">FIRST NAME</label>
                 <input type="text" id="firstName" name="firstName" placeholder="Thor" maxlength="20" required>
            
            
            
                <label for = "lastName">LAST NAME</label>
                <input type="text" id="lastName" name="lastName" placeholder="Odinson" 
                maxlength="30" required>
            </div>

            <div class="formItem">
                <label for = "email">EMAIL</label>
                <input type="email" id="email" name="email" placeholder="example.com" required>

                <label for = "phoneNumber">PHONE NUMBER</label>
                <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="123-456-7890" required>
            </div>

            <div class="formItem">
                <label for = "password">PASSWORD</label>
                <input type="password" id="password" name="password"  required>
            

            
                <label for = "confirmPassword">CONFIRM PASSWORD</label>
                <input type="password" id="confirmPassword" name="confirmPassword"  required>
            </div>

            <div class = "accountSetup">
                <button type="submit">create account</button>
                <p>Already have an account? <a href="#">Log in</a></p>
            </div>
        </form>
     
        
    </div>
        
    
   
</div>

   
</body>
</html>
